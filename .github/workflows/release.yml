name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows CUDA
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: "12.4.0"
          method: network

      - name: Build release (CUDA, max optimization)
        run: cargo build --release --target x86_64-pc-windows-msvc --features cuda
        env:
          # Enable AVX2/FMA/F16C — covers Intel Haswell (2013) and AMD Zen (2017) onward.
          # llama-cpp-sys-2 build.rs auto-maps these to GGML_AVX2, GGML_FMA, GGML_F16C etc.
          RUSTFLAGS: "-C target-cpu=x86-64-v3"
          # Only compile CUDA kernels for Turing+ (RTX 2000/3000/4000/5000 series).
          # Drops sm_50/61/70 virtual PTX → significantly smaller binary.
          CMAKE_CUDA_ARCHITECTURES: "75-virtual;80-virtual;86-real;89-real"

      - name: Rename binary
        run: Copy-Item "target\x86_64-pc-windows-msvc\release\tensorl.exe" "TensorL.exe"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TensorL
          path: TensorL.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/TensorL.exe
