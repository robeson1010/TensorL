name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (${{ matrix.label }})
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - label: cpu
            features: ""
            suffix: ""
          - label: cuda
            features: "--features cuda"
            suffix: "-cuda"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM (for llama-cpp-2)
        if: matrix.label == 'cpu'
        run: choco install llvm -y --no-progress

      - name: Install CUDA Toolkit
        if: matrix.label == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: "12.4.0"
          method: network

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc ${{ matrix.features }}

      - name: Rename binary
        run: |
          $src = "target\x86_64-pc-windows-msvc\release\tensorl.exe"
          $dst = "tensorl${{ matrix.suffix }}.exe"
          Copy-Item $src $dst
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tensorl${{ matrix.suffix }}
          path: tensorl${{ matrix.suffix }}.exe

  release:
    name: Create Release
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/tensorl.exe
            dist/tensorl-cuda.exe
